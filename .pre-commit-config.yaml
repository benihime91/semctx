minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        files: ^\.pre-commit-config\.yaml$
      - id: check-added-large-files
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.5
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ruff-check-src-semctx
        name: ruff check src/semctx
        entry: uv run ruff check src/semctx
        language: system
        pass_filenames: false
      - id: ty
        name: ty check
        entry: uv run ty check src/semctx
        language: system
        pass_filenames: false
      - id: compileall-src-semctx
        name: python compileall src/semctx
        entry: uv run python -m compileall "src/semctx"
        language: system
        pass_filenames: false
